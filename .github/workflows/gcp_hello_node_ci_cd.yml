name: Hello Node App to Google GKE

on:
  # push:
  #   branches:
  #       - main
  #   paths: 
  #       - "docker/app1-hello/node"
  workflow_dispatch:

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:
          - name: Checkout Code
            uses: actions/checkout@v6

          - name: Setup Node.js
            uses: actions/setup-node@v6
            with:
                node-version: '25'

          - name: Install Dependencies
            working-directory: docker/app1-hello/node
            run: npm ci

          - name: Run Tests (If any)
            working-directory: docker/app1-hello/node
            run: npm test --if-present

    docker-build-push:
        runs-on: ubuntu-latest
        needs: build-test

        steps:
          - name: Checkout Code
            uses: actions/checkout@v6

          - name: Login to Docker Hub
            uses: docker/login-action@v3
            with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

          - name: Build and Push Docker Image
            uses: docker/build-push-action@v6
            with:
                context: docker/app1-hello/node
                push: true
                tags: |
                    ${{ secrets.DOCKER_USERNAME }}/hello-node:latest

    deploy-gcp-gke:
        runs-on: ubuntu-latest
        needs: docker-build-push

        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Authenticate to Google Cloud
            uses: 'google-github-actions/auth@v3'
            with:
              credentials_json: ${{ secrets.GCP_SA_KEY }}

          - name: Setup gcloud CLI
            uses: 'google-github-actions/setup-gcloud@v3'

          - name: Install gke-cloud-auth-plugin
            run: |
              gcloud components install gke-gcloud-auth-plugin

          - name: Configure kubectl for GKE
            run: |
              gcloud container clusters get-credentials ${{ secrets.GCP_CLUSTER_NAME }} \
                --region ${{ secrets.GCP_REGION }}
      
          - name: Verify connection
            run: kubectl get nodes

          - name: Deploy to GKE (Google Kubernetes Engine)
            run: kubectl apply -f k8s/gcp/app1-hello



